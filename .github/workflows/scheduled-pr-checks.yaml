name: Scheduled Deploy Window Check Example

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  deploy-window-check-scheduled:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Deploy Window Check (Scheduled)
        uses: guidion-digital/deploy-window-guard/.github/actions/deploy-window-guard@timezones-2
        with:
          bypass_label: "bypass-deploy-window-guard"
          timezone: "Europe/Amsterdam"
          scheduled: "true"
          start_hour: "16"
          end_hour: "8"
