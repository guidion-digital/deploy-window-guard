name: Run PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  deploy-window-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Needed for the gh CLI to pick up context from
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Deploy Window Check
        uses: guidion-digital/deploy-window-guard/.github/actions/deploy-window-guard@v2
        with:
          bypass_label: "bypass-deploy-window-guard"
          timezone: "Europe/Amsterdam"
          start_hour: "16"
          end_hour: "8"
